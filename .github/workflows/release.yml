name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

# One job per platform.  Each job builds the single `md` binary, which works
# as both a CLI tool and (on macOS) as a native GUI app when bundled into a
# .app / .dmg.

jobs:
  # ── macOS — universal binary + .dmg bundle ──────────────────────────────
  macos:
    name: macOS (universal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      # Build universal binary (.app + .dmg)
      - name: Build universal macOS app
        working-directory: crates/markdown-app
        run: cargo tauri build --target universal-apple-darwin

      # Also extract the raw `md` CLI binary from the bundle for users who
      # just want the terminal tool without installing the .app.
      - name: Package CLI binary
        run: |
          BIN=target/universal-apple-darwin/release/md
          ARCHIVE=md-${{ github.ref_name }}-universal-apple-darwin.tar.gz
          tar -czf "$ARCHIVE" -C "$(dirname $BIN)" "$(basename $BIN)"
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            target/universal-apple-darwin/release/bundle/dmg/*.dmg
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  # ── Linux ────────────────────────────────────────────────────────────────
  linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
            cross_pkg: ""
          - arch: aarch64
            target: aarch64-unknown-linux-gnu
            cross_pkg: gcc-aarch64-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps (GUI)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf ${{ matrix.cross_pkg }}

      - name: Set cross-linker (aarch64)
        if: matrix.arch == 'aarch64'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Build Linux app + CLI
        working-directory: crates/markdown-app
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Package CLI binary
        run: |
          BIN=target/${{ matrix.target }}/release/md
          ARCHIVE=md-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          tar -czf "$ARCHIVE" -C "$(dirname $BIN)" "$(basename $BIN)"
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  # ── Windows ──────────────────────────────────────────────────────────────
  windows:
    name: Windows (x86_64)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Build Windows app + CLI
        working-directory: crates/markdown-app
        run: cargo tauri build

      - name: Package CLI binary
        shell: pwsh
        run: |
          $bin = "target\release\md.exe"
          $archive = "md-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip"
          Compress-Archive -Path $bin -DestinationPath $archive
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash
          $hash | Out-File "$archive.sha256"
          echo "ARCHIVE=$archive" | Out-File -Append $env:GITHUB_ENV

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            target/release/bundle/msi/*.msi
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
